name: Catalog Listing Tests

on:
  push:
    paths:
      - "CatalogandListing/**"
      - ".github/workflows/catalog-listing-tests.yml"
  pull_request:
    paths:
      - "CatalogandListing/**"
      - ".github/workflows/catalog-listing-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CatalogandListing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw test

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gotravel_db}
    username: ${DB_USERNAME:gotravel_db}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false

jwt:
  signerKey: ${JWT_SECRET_KEY:}

media:
  service:
    url: ${MEDIA_SERVICE_URL:http://localhost:5001/api/v1/media/upload/}


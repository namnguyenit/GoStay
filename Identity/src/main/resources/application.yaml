server:
  port: 8080

spring:
  servlet:
    multipart:
      max-request-size: 10MB
      max-file-size: 10MB
  application:
    name: Identity
  profiles:
    active: dev
  config:
    import:
      - optional:classpath:database.yaml
      - optional:classpath:jwt.yaml
media:
  service:
    url: http://localhost:5001/api/v1/media/upload/single